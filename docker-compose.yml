services:
  accounting-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kirjanpito-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./tests:/app/tests
    environment:
      - DB_PATH=${DB_PATH:-data/accounting.db}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
