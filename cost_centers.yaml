# Cost centers configuration
# Edit this file to add or update cost centers.
# Changes are synced to the database on next app startup.
#
# Fields:
#   id            (required) - stable numeric ID, never reuse a deleted ID
#   name          (required) - display name
#   type                     - apartment | forest | other  (default: other)
#   description              - free text note
#   vat_deductible           - true if VAT can be reclaimed (default: false)
#                              Residential rental is VAT-exempt -> false
#                              VAT-registered forest company -> true

cost_centers:
  - id: 1
    name: "Asunto Oy Esimerkki - Huoneisto 1"
