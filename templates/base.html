<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Kirjanpito{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.03em; }
    .table th { white-space: nowrap; }
    .receipt-thumb { max-height: 60px; max-width: 80px; object-fit: cover; border-radius: 4px; cursor: pointer; }
    .badge-forest { background-color: #2d6a4f; }
    .badge-apartment { background-color: #1565c0; }
    .badge-other { background-color: #6c757d; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/expenses/"><i class="bi bi-journal-text me-2"></i>Kirjanpito</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/expenses/"><i class="bi bi-list-ul me-1"></i>Tapahtumat</a></li>
        <li class="nav-item"><a class="nav-link" href="/reports/"><i class="bi bi-bar-chart me-1"></i>Raportit</a></li>
        <li class="nav-item"><a class="nav-link" href="/categories/"><i class="bi bi-tags me-1"></i>Kategoriat</a></li>
        <li class="nav-item"><a class="nav-link" href="/cost-centers/"><i class="bi bi-building me-1"></i>Kustannuspaikat</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
<footer class="bg-light py-3 mt-5 border-top small text-muted">
  <div class="container text-center">
    <div>Kirjanpito v{{ request.state.version.full }}</div>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
