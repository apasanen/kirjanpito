{% extends "base.html" %}
{% block title %}Muokkaa kustannuspaikkaa{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <h2 class="mb-4"><i class="bi bi-pencil me-2"></i>Muokkaa kustannuspaikkaa</h2>
    <form method="post" action="/cost-centers/{{ center.id }}/edit" class="card shadow-sm p-4">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-semibold">Nimi <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required maxlength="100" value="{{ center.name }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Tyyppi</label>
          <select name="type" class="form-select">
            <option value="apartment" {% if center.type == "apartment" %}selected{% endif %}>Asunto</option>
            <option value="forest" {% if center.type == "forest" %}selected{% endif %}>Metsä</option>
            <option value="other" {% if center.type == "other" %}selected{% endif %}>Muu</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Kuvaus</label>
          <input type="text" name="description" class="form-control" maxlength="200"
                 value="{{ center.description or '' }}">
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="vat_deductible" value="1" id="vat_deductible"
                   {% if center.vat_deductible %}checked{% endif %}>
            <label class="form-check-label" for="vat_deductible">ALV-vähennyskelpoinen</label>
          </div>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="active" value="1" id="active"
                   {% if center.active %}checked{% endif %}>
            <label class="form-check-label" for="active">Aktiivinen</label>
          </div>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>Tallenna
          </button>
          <a href="/cost-centers/" class="btn btn-outline-secondary">Peruuta</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
